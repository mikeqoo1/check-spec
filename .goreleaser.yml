version: 2

project_name: check-spec

before:
  hooks:
    - go mod tidy

builds:
  - id: check-spec
    main: ./cmd/check-spec
    binary: check-spec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mikeqoo1/check-spec/internal/version.Version={{ .Version }}
      - -X github.com/mikeqoo1/check-spec/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/mikeqoo1/check-spec/internal/version.Date={{ .Date }}

archives:
  - id: default
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - action.yml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Tag }}-next'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?(feat|add)(\(.+\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(fix|bug)(\(.+\))?!?:.+$'
      order: 1
    - title: Other changes
      order: 99
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: mikeqoo1
    name: check-spec
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## check-spec {{ .Tag }}

    See [README](https://github.com/mikeqoo1/check-spec#readme) for usage.
  footer: |
    ---
    🤖 Released with [GoReleaser](https://goreleaser.com)
